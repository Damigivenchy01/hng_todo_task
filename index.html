<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article data-testid="test-todo-card" aria-label="Task card">
      <!-- Header -->
      <div class="header-row">
        <div class="badges">
          <span
            data-testid="test-todo-priority"
            class="badge badge-high"
            aria-label="Priority: High"
          >
            <span aria-hidden="true">↑</span> High
          </span>
          <span
            id="status-badge"
            data-testid="test-todo-status"
            class="badge badge-inprogress"
            aria-label="Status: In Progress"
          >
            In Progress
          </span>
        </div>

        <div class="actions">
          <button
            data-testid="test-todo-edit-button"
            class="icon-btn"
            aria-label="Edit task"
            onclick="console.log('edit clicked')"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
              />
              <path
                d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
              />
            </svg>
          </button>
          <button
            data-testid="test-todo-delete-button"
            class="icon-btn delete-btn"
            aria-label="Delete task"
            onclick="alert('Delete clicked')"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <polyline points="3 6 5 6 21 6" />
              <path d="M19 6l-1 14H6L5 6" />
              <path d="M10 11v6M14 11v6" />
              <path d="M9 6V4h6v2" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Title + Checkbox -->
      <div class="title-row">
        <label class="check-label" aria-label="Mark task as complete">
          <input
            type="checkbox"
            data-testid="test-todo-complete-toggle"
            id="todo-checkbox"
            onchange="handleToggle(this)"
          />
          <span class="custom-checkbox" aria-hidden="true">
            <svg
              width="10"
              height="10"
              viewBox="0 0 12 12"
              fill="none"
              stroke="white"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="1.5 6 4.5 9 10.5 3" />
            </svg>
          </span>
        </label>

        <h2 data-testid="test-todo-title" id="todo-title">Redesign the Ui</h2>
      </div>

      <!-- Description -->
      <p data-testid="test-todo-description">
        Need to redesign the ui to make it fluid and perfect, this improves the
        user experience and helps with responsiveness on smaller devices.
      </p>

      <!-- Tags -->
      <ul data-testid="test-todo-tags" role="list" aria-label="Task tags">
        <li data-testid="test-todo-tag-work">#work</li>
        <li data-testid="test-todo-tag-urgent">#urgent</li>
        <li>#design</li>
      </ul>

      <div class="divider"></div>

      <!-- Due date + Time remaining -->
      <div class="date-row">
        <div class="date-block">
          <span class="meta-label">Due date</span>
          <time
            data-testid="test-todo-due-date"
            id="due-date-el"
            datetime="2026-04-18T18:00:00Z"
          >
            Due Apr 18, 2026
          </time>
        </div>

        <div class="date-block">
          <span class="meta-label">Time left</span>
          <time
            data-testid="test-todo-time-remaining"
            id="time-remaining-el"
            datetime="2026-04-18T18:00:00Z"
            aria-live="polite"
            class="time-normal"
          >
            Calculating…
          </time>
        </div>
      </div>
    </article>

    <script src="script.js"></script>
  </body>
</html>
